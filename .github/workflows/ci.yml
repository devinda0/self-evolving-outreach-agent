name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - lint, type-check, unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check app/ tests/ || true

      - name: Type check (mypy)
        run: uv run mypy app/ --ignore-missing-imports || true

      - name: Unit tests
        run: |
          uv run pytest tests/ -m "not integration" -v --tb=short
          rc=$?; [ $rc -eq 0 ] || [ $rc -eq 5 ]
        env:
          MONGODB_URI: mongodb://localhost:27017
          DB_NAME: signal_test
          GEMINI_API_KEY: test-key
          TAVILY_API_KEY: test-key
          RESEND_API_KEY: test-key
          UNIPILE_API_KEY: test-key

  frontend:
    name: Frontend - type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm ci

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build
