name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy backend to Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "signal-to-action-backend" \
            --environment "production" \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --ci

      - name: Health check
        env:
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          echo "Waiting 30s for container to start..."
          sleep 30
          echo "Polling health endpoint..."
          for i in $(seq 1 15); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || true)
            if [ "$status" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $status, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 255s"
          exit 1