version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: signal_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: signal_to_action

  backend:
    build: ./backend
    container_name: signal_backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      DB_NAME: signal_to_action
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
